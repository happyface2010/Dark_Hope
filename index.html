<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Архив Фонда | Терминал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000000;
            font-family: 'Courier New', 'Fira Code', 'Source Code Pro', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            color: #aa4a4a;
            text-shadow: 0 0 2px #440000;
        }

        /* ========= ТЁМНО-КРАСНОЕ МЕРЦАНИЕ ========= */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 0%;
            filter: blur(100px);
            opacity: 0.12;
            animation: pulseDarkRed 14s infinite alternate ease-in-out;
            background: radial-gradient(circle, #660000, #1a0000);
        }

        .orb1 {
            width: 70vw;
            height: 70vw;
            top: -20vh;
            left: -20vw;
            animation-duration: 16s;
        }

        .orb2 {
            width: 80vh;
            height: 80vh;
            bottom: -30vh;
            right: -20vw;
            animation-duration: 20s;
            animation-delay: -5s;
        }

        .orb3 {
            width: 60vw;
            height: 60vw;
            top: 40vh;
            right: 10vw;
            animation-duration: 22s;
            animation-delay: -8s;
        }

        .orb4 {
            width: 50vw;
            height: 50vw;
            bottom: 10vh;
            left: 15vw;
            animation-duration: 18s;
            animation-delay: -3s;
        }

        @keyframes pulseDarkRed {
            0% {
                transform: scale(0.9) translate(0px, 0px);
                opacity: 0.06;
            }
            100% {
                transform: scale(1.5) translate(20px, -20px);
                opacity: 0.18;
            }
        }

        /* БЕЛЫЙ ШУМ (полупрозрачный) */
        .white-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjkiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMTUiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.2;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: normal;
        }

        /* дополнительный слой зернистости для усиления эффекта */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MDAiIGhlaWdodD0iNTAwIj48ZmlsdGVyIGlkPSJhIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjYiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjYSkiIG9wYWNpdHk9IjAuMTIiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.25;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            width: 100%;
            border: 2px solid #6a1a1a;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(1px);
            padding: 2rem;
            box-shadow: 0 0 18px rgba(100, 20, 20, 0.4), inset 0 0 5px rgba(100, 20, 20, 0.2);
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #6a1a1a;
            padding-bottom: 1rem;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #aa5555;
            text-shadow: 0 0 6px #3a0000;
            background: none;
            font-family: 'Courier New', monospace;
        }

        /* субтитр удалён по требованию */
        .sub {
            display: none;
        }

        .status-panel {
            background: #0a0202;
            border: 1px solid #6a1a1a;
            padding: 0.6rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            box-shadow: inset 0 0 6px rgba(100, 20, 20, 0.3), 0 2px 6px rgba(0,0,0,0.8);
        }

        .counter {
            font-size: 0.85rem;
            background: #0a0000;
            padding: 0.3rem 1rem;
            border-left: 3px solid #8b3a3a;
            font-weight: 600;
            letter-spacing: 1px;
            color: #bb7777;
        }

        .counter span {
            color: #cc8888;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 4px #550000;
        }

        .refresh-btn {
            background: #0a0101;
            border: 1px solid #8b2a2a;
            padding: 0.4rem 1.4rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #bb6a6a;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .refresh-btn:hover {
            background: #2a0a0a;
            border-color: #aa5555;
            color: #dd8888;
            box-shadow: 0 0 12px rgba(100, 30, 30, 0.6);
            transform: scale(0.98);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .file-card {
            background: #040000;
            border: 1px solid #6a1a1a;
            padding: 1.2rem 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-decoration: none;
            display: block;
            color: #b66a6a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .file-card:hover {
            background: #1a0606;
            border-color: #aa4a4a;
            box-shadow: 0 0 15px rgba(100, 30, 30, 0.6);
            transform: translateY(-3px);
            color: #dd8888;
        }

        .file-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #aa5555;
            text-shadow: 0 0 5px #440000;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .file-name {
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            background: #0f0000;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-left: 2px solid #8b3a3a;
            border-right: 2px solid #8b3a3a;
        }

        .file-badge {
            margin-top: 0.8rem;
            font-size: 0.7rem;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: monospace;
        }

        .badge-html {
            background: #1a0404;
            padding: 0.2rem 0.6rem;
            border-left: 2px solid #8b3a3a;
            color: #bb7777;
        }

        .empty-message {
            text-align: center;
            padding: 2rem 1rem;
            background: #030000;
            border: 1px solid #6a1a1a;
            font-size: 0.9rem;
            color: #bb7777;
        }

        .empty-message p {
            margin: 0.5rem 0;
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.6;
            border-top: 1px solid #6a1a1a;
            padding-top: 1rem;
            color: #aa6a6a;
            letter-spacing: 1px;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .content {
                padding: 1rem;
            }
            .gallery-grid {
                gap: 1rem;
            }
            .file-card {
                padding: 1rem 0.6rem;
            }
            .status-panel {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
        }

        @keyframes darkRedPulse {
            0% { text-shadow: 0 0 0px #550000; border-color: #6a1a1a;}
            100% { text-shadow: 0 0 3px #aa5555; border-color: #aa4a4a;}
        }
        .file-card:hover .file-name {
            animation: darkRedPulse 0.6s infinite alternate;
        }

        .refresh-btn:active {
            background: #2a0808;
            transform: scale(0.96);
        }
    </style>
</head>
<body>

<div class="ambient-glow">
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
    <div class="glow-orb orb3"></div>
    <div class="glow-orb orb4"></div>
</div>
<div class="white-noise"></div>
<div class="grain-overlay"></div>

<div class="content">
    <div class="hero">
        <h1>[АРХИВ ФОНДА]</h1>
        <div class="sub"></div>
    </div>

    <div class="status-panel">
        <div class="counter">
            [ОБНАРУЖЕНО ФАЙЛОВ] : <span id="fileCount">0</span>
        </div>
        <div class="refresh-btn" id="manualRefreshBtn">
            [ СКАНИРОВАТЬ ]
        </div>
    </div>

    <div id="galleryContainer" class="gallery-grid">
        <div class="empty-message" style="grid-column:1/-1;">
            <p>СКАНИРОВАНИЕ HTML-ФАЙЛОВ ...</p>
        </div>
    </div>
    <footer>
        ЕСЛИ ВАШ УРОВЕНЬ ДОСТУПА НИЖЕ 4, ПОЖАЛУЙСТА, СООБЩИТЕ О ТОМ, ЧТО УВИДЕЛИ, АДМИНИСТРАЦИИ ВАШЕГО КОМПЛЕКСА
    </footer>
</div>

<script>
    (function() {
        const galleryContainer = document.getElementById('galleryContainer');
        const fileCountSpan = document.getElementById('fileCount');

        function clearContainer() {
            galleryContainer.innerHTML = '';
        }

        function showLoadingState(isLoading = true) {
            if (isLoading) {
                galleryContainer.innerHTML = `
                    <div class="empty-message" style="grid-column:1/-1;">
                        <p>[ АНАЛИЗ ДИРЕКТОРИИ ] ... ПОИСК .HTML</p>
                        <small style="opacity:0.7">ЗАПРОС СПИСКА ЧЕРЕЗ API ХОСТИНГА</small>
                    </div>
                `;
            }
        }

        function renderFileList(htmlFiles) {
            clearContainer();
            if (!htmlFiles.length) {
                galleryContainer.innerHTML = `
                    <div class="empty-message" style="grid-column:1/-1;">
                        <p>[ФАЙЛЫ НЕ ОБНАРУЖЕНЫ]</p>
                    </div>
                `;
                fileCountSpan.innerText = '0';
                return;
            }

            fileCountSpan.innerText = htmlFiles.length;
            for (let fileName of htmlFiles) {
                const card = document.createElement('a');
                card.className = 'file-card';
                card.href = fileName;
                card.target = '_self';

                const iconSpan = document.createElement('div');
                iconSpan.className = 'file-icon';
                iconSpan.innerHTML = '[HTML]';  

                const nameSpan = document.createElement('div');
                nameSpan.className = 'file-name';
                nameSpan.innerText = fileName;
                
                const badgeDiv = document.createElement('div');
                badgeDiv.className = 'file-badge';
                badgeDiv.innerHTML = `<span class="badge-html">[ .HTML ]</span> <span>[ ПЕРЕХОД ]</span>`;
                
                card.appendChild(iconSpan);
                card.appendChild(nameSpan);
                card.appendChild(badgeDiv);
                
                card.addEventListener('click', (e) => {
                    console.log(`Переход: ${fileName}`);
                });
                galleryContainer.appendChild(card);
            }
        }

        async function fetchHtmlFilesFromDirectory() {
            let basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
            const directoryUrl = basePath || './';
            
            try {
                const response = await fetch(directoryUrl, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - листинг недоступен`);
                }
                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                const anchors = doc.querySelectorAll('a');
                const currentFileName = window.location.pathname.split('/').pop() || 'index.html';
                const currentFileNormalized = currentFileName.toLowerCase();
                
                const foundFiles = new Set();
                for (let anchor of anchors) {
                    let href = anchor.getAttribute('href');
                    if (!href) continue;
                    let decodedHref = decodeURIComponent(href);
                    if (decodedHref.includes('?')) decodedHref = decodedHref.split('?')[0];
                    if (decodedHref.includes('#')) decodedHref = decodedHref.split('#')[0];
                    
                    if (decodedHref.toLowerCase().endsWith('.html')) {
                        let cleanName = decodedHref;
                        if (cleanName.startsWith('./')) cleanName = cleanName.substring(2);
                        if (cleanName.startsWith('/')) cleanName = cleanName.substring(1);
                        if (cleanName.toLowerCase() !== currentFileNormalized && cleanName.trim() !== '') {
                            if (!cleanName.includes('://') && !cleanName.startsWith('http')) {
                                foundFiles.add(cleanName);
                            }
                        }
                    }
                }
                let filesArray = Array.from(foundFiles);
                filesArray.sort((a,b) => a.localeCompare(b));
                return filesArray;
            } catch (err) {
                console.warn('Ошибка получения листинга:', err);
                return [];
            }
        }
        
        async function updateGallery() {
            showLoadingState(true);
            let htmlFiles = [];
            try {
                htmlFiles = await fetchHtmlFilesFromDirectory();
            } catch (globalErr) {
                console.error("Критическая ошибка:", globalErr);
                htmlFiles = [];
            }
            if (!Array.isArray(htmlFiles)) htmlFiles = [];
            
            const unique = [];
            const lowerMap = new Map();
            for (const file of htmlFiles) {
                const lower = file.toLowerCase();
                if (!lowerMap.has(lower)) {
                    lowerMap.set(lower, file);
                    unique.push(file);
                }
            }
            const finalFiles = unique.filter(f => f !== 'index.html' && f !== './index.html' && f !== '/index.html');
            renderFileList(finalFiles);
        }
        
        const refreshBtn = document.getElementById('manualRefreshBtn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', (e) => {
                e.preventDefault();
                updateGallery().catch(e => console.warn(e));
            });
        }
        
        updateGallery().catch(err => {
            console.error("Ошибка инициализации:", err);
            galleryContainer.innerHTML = `
                <div class="empty-message" style="grid-column:1/-1;">
                    <p>[ ОШИБКА ] НЕ УДАЛОСЬ ПРОСКАНИРОВАТЬ ДИРЕКТОРИЮ</p>
                    <p>УБЕДИТЕСЬ, ЧТО ХОСТИНГ РАЗРЕШАЕТ ПРОСМОТР ФАЙЛОВ (ЛИСТИНГ)<br>
                    ИЛИ НАЖМИТЕ [ СКАНИРОВАТЬ ] ПОВТОРНО</p>
                    <button id="retryBtn" style="margin-top:12px; background:#1a0101; border:1px solid #8b2a2a; padding:6px 18px; font-family:monospace; color:#bb6a6a; cursor:pointer;">[ ПОВТОР ]</button>
                </div>
            `;
            const retry = document.getElementById('retryBtn');
            if (retry) retry.addEventListener('click', () => updateGallery());
            fileCountSpan.innerText = '0';
        });
    })();
</script>
</body>
</html>
